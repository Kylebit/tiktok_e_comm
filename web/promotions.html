<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>促销工具</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">TikTok Shop 控制台</a>
    <nav class="nav">
      <a href="/">首页</a>
      <a href="/catalog">商品目录</a>
      <a href="/costs">成本维护</a>
      <a href="/titles">Listing 优化</a>
      <a href="/images">主图优化</a>
      <a href="/analytics">Analytics</a>
      <a href="/deactivate">零销下架</a>
      <a href="/promotions" class="active">促销工具</a>
    </nav>
  </header>
  <main class="container">
    <h1>促销工具</h1>
    <p class="hint">折扣调整 · 加入促销 · 限时秒杀 · 优惠券。A 类建议配合 <a href="/titles">Listing 优化</a>。近 <strong>15 天</strong>内已通过本工具推送过促销调价的商品不会出现在扫描建议中。</p>

    <div id="activityBar" class="status-bar">加载活动...</div>

    <div class="tabs">
      <button class="tab active" data-tab="adjust" onclick="switchTab('adjust')">加深折扣</button>
      <button class="tab" data-tab="add" onclick="switchTab('add')">加入促销</button>
      <button class="tab" data-tab="flash" onclick="switchTab('flash')">限时秒杀</button>
      <button class="tab" data-tab="coupons" onclick="switchTab('coupons')">优惠券</button>
    </div>

    <div id="panelProducts">
      <details class="scan-panel" open>
        <summary>扫描促销候选</summary>
        <div class="scan-form">
          <label>来源
            <select id="scanMode" onchange="toggleScanMode()">
              <option value="analytics">Analytics A 类（高 CTR 0 单，推荐）</option>
              <option value="velocity">低动销 · 按订单量</option>
            </select>
          </label>
          <span id="velocityOpts">
            <label>近 <input id="days" type="number" value="30" min="7" max="90" style="width:56px"> 天</label>
            <label>销量 ≤ <input id="maxUnits" type="number" value="1" min="0" max="99" style="width:56px"></label>
          </span>
          <label>最多 <input id="limit" type="number" value="20" min="1" max="100" style="width:56px"> 个</label>
          <button class="btn-primary" id="scanBtn" onclick="startScan()">开始扫描</button>
          <span id="scanStatus"></span>
        </div>
      </details>

      <div class="toolbar">
        <label>站点
          <select id="region" onchange="onRegionChange()">
            <option value="">全部站点</option>
            <option value="MY">MY</option>
            <option value="VN">VN</option>
            <option value="TH">TH</option>
            <option value="PH">PH</option>
          </select>
        </label>
        <button class="btn-secondary" onclick="selectAll(true)">全选</button>
        <button class="btn-secondary" onclick="selectAll(false)">全不选</button>
        <button class="btn-primary" id="pushBtn" onclick="pushSelected()">推送到 TikTok</button>
        <span id="status"></span>
      </div>
      <div id="list"><p class="hint">加载中...</p></div>
    </div>

    <div id="panelCoupons" style="display:none">
      <p class="hint warn-box">Open API 暂不支持<strong>创建</strong>优惠券（仅查询）。下方可生成建议配置，复制到 Seller Center → 营销 → 优惠券 手动创建。</p>
      <div class="toolbar">
        <select id="couponRegion">
          <option value="">全部站点</option>
          <option value="MY">MY</option>
          <option value="VN">VN</option>
          <option value="TH">TH</option>
          <option value="PH">PH</option>
        </select>
        <button class="btn-primary" onclick="scanCoupons()">生成优惠券建议</button>
        <button class="btn-secondary" onclick="loadCoupons()">刷新已有优惠券</button>
      </div>
      <h2 class="section-title">已有优惠券</h2>
      <div id="couponList" class="hint">加载中...</div>
      <h2 class="section-title">待手动创建的建议</h2>
      <div id="draftList" class="hint">暂无</div>
    </div>
  </main>
  <script>
    var items = [];
    var currentTab = 'adjust';
    var tabHints = {
      adjust: '已在「直接折扣」活动内：低动销或 A 类（高 CTR 0 单），建议加深折扣。',
      add: '未在促销中：A 类高兴趣低转化商品，建议加入直接折扣。',
      flash: 'A 类或低动销商品创建新的「商家秒杀」活动（FLASHSALE）。'
    };

    function toggleScanMode() {
      var v = document.getElementById('scanMode').value;
      document.getElementById('velocityOpts').style.display = v === 'velocity' ? 'inline' : 'none';
    }
    toggleScanMode();

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(function(el) {
        el.classList.toggle('active', el.dataset.tab === tab);
      });
      var isCoupon = tab === 'coupons';
      document.getElementById('panelProducts').style.display = isCoupon ? 'none' : 'block';
      document.getElementById('panelCoupons').style.display = isCoupon ? 'block' : 'none';
      if (!isCoupon) loadItems();
      else { loadCoupons(); loadDrafts(); }
    }

    function onRegionChange() {
      loadItems();
      loadActivities();
    }

    function regionQuery() {
      var reg = document.getElementById('region').value;
      return reg ? ('&region=' + encodeURIComponent(reg)) : '';
    }

    function loadActivities() {
      fetch('/api/promotions/activities' + (document.getElementById('region').value
        ? ('?region=' + encodeURIComponent(document.getElementById('region').value)) : ''))
        .then(function(r) { return r.json(); })
        .then(function(res) {
        var el = document.getElementById('activityBar');
        if (!res.ok || !res.activities || !res.activities.length) {
          el.textContent = '未找到进行中的促销活动';
          el.className = 'status-bar warn';
          return;
        }
        el.innerHTML = res.activities.map(function(a) {
          var type = a.activity_type === 'DIRECT_DISCOUNT' ? '直接折扣' :
            a.activity_type === 'FLASHSALE' ? '秒杀' : a.activity_type;
          return '<b>' + esc(a.region) + '</b> ' + type + ' · ' + a.product_count + ' 商品';
        }).join(' &nbsp;|&nbsp; ');
        el.className = 'status-bar ok';
      }).catch(function() {
        document.getElementById('activityBar').textContent = '无法加载活动信息';
      });
    }

    function loadItems() {
      var url = '/api/promotions?action=' + encodeURIComponent(currentTab) + regionQuery();
      return fetch(url).then(function(r) {
        return r.json();
      }).then(function(res) {
        if (!res.ok) throw new Error(res.error || '加载失败');
        items = res.items || [];
        render();
      });
    }

    function fmtStats(it) {
      var parts = [];
      if (it.click_through_rate != null && it.click_through_rate > 0) {
        parts.push('28天 CTR ' + (Number(it.click_through_rate) * 100).toFixed(2) + '%');
        if (it.ctr_median != null && it.ctr_median > 0) {
          parts.push('中位 ' + (Number(it.ctr_median) * 100).toFixed(2) + '%');
        }
      }
      var o28 = it.analytics_orders;
      if (o28 != null) {
        parts.push('28天 ' + o28 + ' 单');
      }
      parts.push('近30天 ' + (it.units_sold != null ? it.units_sold : 0) + ' 件');
      parts.push((it.order_count != null ? it.order_count : 0) + ' 单');
      parts.push('库存 ' + (it.stock != null ? it.stock : 0));
      return parts.join(' · ');
    }

    function fmtPrice(price, currency) {
      if (!price) return '—';
      return esc(currency) + ' ' + Number(price).toFixed(currency === 'VND' ? 0 : 2);
    }

    function render() {
      var el = document.getElementById('list');
      var hint = document.querySelector('#panelProducts .scan-panel summary');
      if (hint) hint.textContent = '扫描低动销商品 — ' + (tabHints[currentTab] || '');

      if (!items.length) {
        el.innerHTML = '<div class="empty">暂无待处理项<br><br>点击「开始扫描」</div>';
        return;
      }

      el.innerHTML = items.map(function(it, i) {
        var margin = it.margin_pct != null ? (' · 预估毛利 ' + it.margin_pct + '%') : '';
        var note = it.error ? ('<div class="note-warn">' + esc(it.error) + '</div>') : '';
        var badge = it.action === 'add' ? '<span class="tag">新加入</span>' :
          it.action === 'flash' ? '<span class="tag">秒杀</span>' : '';

        var editBlock = '';
        if (it.action === 'flash') {
          editBlock =
            '<label>秒杀价（可编辑）</label>' +
            '<input type="number" class="discount-input" style="width:120px" id="flash-' + i + '" step="0.01" min="0" value="' +
              (it.flash_price || it.promo_price || '') + '">' +
            '<div class="price-row subtle">标价 ' + fmtPrice(it.list_price, it.currency) +
              ' · 约 ' + (it.new_discount || '') + '% off</div>';
        } else {
          editBlock =
            '<div class="price-row">' +
              '<span>标价 ' + fmtPrice(it.list_price, it.currency) + '</span>' +
              (it.in_activity ? '<span>当前 ' + it.old_discount + '% → ' + fmtPrice(it.promo_price, it.currency) + '</span>' : '') +
            '</div>' +
            '<label>折扣 %（可编辑）</label>' +
            '<input type="number" class="discount-input" id="disc-' + i + '" min="1" max="90" step="0.5" value="' +
              (it.new_discount != null ? it.new_discount : it.suggested_discount) + '">';
        }

        return '<div class="card item-card">' +
          '<div class="row">' +
            (it.image_url ? '<img class="thumb" src="' + esc(it.image_url) + '">' : '<div class="thumb"></div>') +
            '<div style="flex:1">' +
              '<div class="meta">' + esc(it.region) + badge + ' · ' + fmtStats(it) + margin + '</div>' +
              note +
              '<div class="old">' + esc(it.product_name) + '</div>' +
              editBlock +
              '<label class="chk"><input type="checkbox" id="chk-' + i + '" checked> 确认推送</label>' +
            '</div>' +
          '</div></div>';
      }).join('');
    }

    function selectAll(v) {
      items.forEach(function(_, i) {
        var c = document.getElementById('chk-' + i);
        if (c) c.checked = v;
      });
    }

    function startScan() {
      var btn = document.getElementById('scanBtn');
      var st = document.getElementById('scanStatus');
      btn.disabled = true;
      st.textContent = '提交中...';
      fetch('/api/promotions/scan', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          mode: document.getElementById('scanMode').value || 'velocity',
          days: parseInt(document.getElementById('days').value, 10) || 30,
          max_units: parseInt(document.getElementById('maxUnits').value, 10),
          limit: parseInt(document.getElementById('limit').value, 10) || 20,
          region: document.getElementById('region').value || null,
          scope: currentTab
        })
      }).then(function(r) { return r.json(); }).then(function(res) {
        if (!res.ok) {
          alert(res.error || res.message || '无法启动扫描');
          btn.disabled = false;
          st.textContent = '';
          return;
        }
        pollScan();
      }).catch(function(e) {
        alert(e);
        btn.disabled = false;
        st.textContent = '';
      });
    }

    function pollScan() {
      var btn = document.getElementById('scanBtn');
      var st = document.getElementById('scanStatus');
      fetch('/api/promotions/scan/status').then(function(r) { return r.json(); }).then(function(s) {
        if (s.running) {
          st.textContent = s.message || '扫描中...';
          setTimeout(pollScan, 1500);
          return;
        }
        btn.disabled = false;
        if (s.error) { st.textContent = '失败: ' + s.error; return; }
        st.textContent = s.message || '完成';
        loadItems();
        loadActivities();
        setTimeout(function() { st.textContent = ''; }, 4000);
      });
    }

    function pushSelected() {
      var payload = [];
      items.forEach(function(it, i) {
        var c = document.getElementById('chk-' + i);
        if (!c || !c.checked) return;
        var discInp = document.getElementById('disc-' + i);
        var flashInp = document.getElementById('flash-' + i);
        payload.push({
          id: it.id,
          product_id: it.product_id,
          shop_cipher: it.shop_cipher,
          action: it.action,
          new_discount: discInp ? parseFloat(discInp.value) : it.new_discount,
          flash_price: flashInp ? parseFloat(flashInp.value) : (it.flash_price || it.promo_price)
        });
      });
      if (!payload.length) { alert('请至少勾选一条'); return; }
      var msg = currentTab === 'flash'
        ? '将为每个站点创建新的秒杀活动并添加商品，确认？'
        : '确认将 ' + payload.length + ' 个商品推送到 TikTok？';
      if (!confirm(msg)) return;

      document.getElementById('pushBtn').disabled = true;
      document.getElementById('status').textContent = '提交推送...';
      fetch('/api/promotions/push', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({items: payload})
      }).then(function(r) { return r.json(); }).then(function(res) {
        if (!res.ok) {
          document.getElementById('pushBtn').disabled = false;
          alert(res.error || res.message || '推送失败');
          document.getElementById('status').textContent = '';
          return;
        }
        pollPush();
      });
    }

    function pollPush() {
      fetch('/api/promotions/push/status').then(function(r) { return r.json(); }).then(function(s) {
        if (s.running) {
          document.getElementById('status').textContent = s.message || '推送中...';
          setTimeout(pollPush, 1500);
          return;
        }
        document.getElementById('pushBtn').disabled = false;
        if (s.error) {
          document.getElementById('status').textContent = '失败: ' + s.error;
          alert('推送失败: ' + s.error);
          return;
        }
        document.getElementById('status').textContent = s.message || '完成';
        if (s.errors && s.errors.length) alert(s.errors.slice(0, 5).join('\n'));
        loadItems();
        loadActivities();
      });
    }

    function loadCoupons() {
      var reg = document.getElementById('couponRegion').value;
      var url = '/api/promotions/coupons' + (reg ? ('?region=' + encodeURIComponent(reg)) : '');
      fetch(url).then(function(r) { return r.json(); }).then(function(res) {
        var el = document.getElementById('couponList');
        if (!res.ok) { el.textContent = res.error || '加载失败'; return; }
        var cs = res.coupons || [];
        if (!cs.length) { el.innerHTML = '<p class="hint">暂无优惠券记录</p>'; return; }
        el.innerHTML = cs.slice(0, 20).map(function(c) {
          var disc = c.discount || {};
          var amt = disc.reduction_amount ? (disc.reduction_amount.currency + ' ' + disc.reduction_amount.amount) : '—';
          var thr = c.threshold && c.threshold.min_spend ?
            ('满 ' + c.threshold.min_spend.currency + ' ' + c.threshold.min_spend.amount) : '';
          return '<div class="card item-card" style="padding:10px 12px">' +
            '<b>' + esc(c.region) + '</b> ' + esc(c.title) +
            ' · <span class="tag">' + esc(c.status) + '</span>' +
            '<div class="meta">' + thr + ' 减 ' + amt + '</div></div>';
        }).join('');
      });
    }

    function loadDrafts() {
      fetch('/api/promotions/coupon-drafts').then(function(r) { return r.json(); }).then(function(res) {
        var el = document.getElementById('draftList');
        var drafts = (res.drafts || []).filter(function(d) { return d.status === 'draft'; });
        if (!drafts.length) { el.innerHTML = '<p class="hint">点击「生成优惠券建议」</p>'; return; }
        el.innerHTML = drafts.map(function(d) {
          var cfg = JSON.stringify(d.config || {}, null, 2);
          return '<div class="card item-card">' +
            '<div class="meta">' + esc(d.region) + '</div>' +
            '<strong>' + esc(d.title) + '</strong>' +
            '<p class="hint">' + esc(d.note || '') + '</p>' +
            '<pre class="config-pre">' + esc(cfg) + '</pre>' +
            '<button class="btn-secondary" onclick="copyDraft(' + d.id + ')">复制配置</button> ' +
            '<button class="btn-secondary" onclick="markDraft(' + d.id + ')">已在后台创建</button>' +
            '</div>';
        }).join('');
        window._drafts = drafts;
      });
    }

    function copyDraft(id) {
      var d = (window._drafts || []).find(function(x) { return x.id === id; });
      if (!d) return;
      navigator.clipboard.writeText(JSON.stringify(d.config, null, 2)).then(function() {
        alert('已复制到剪贴板');
      });
    }

    function markDraft(id) {
      fetch('/api/promotions/coupon-drafts/mark', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({id: id})
      }).then(function() { loadDrafts(); });
    }

    function scanCoupons() {
      fetch('/api/promotions/coupons/scan', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          region: document.getElementById('couponRegion').value || null,
          limit: 4
        })
      }).then(function(r) { return r.json(); }).then(function(res) {
        if (!res.ok) { alert(res.error || '失败'); return; }
        alert('已生成 ' + (res.count || 0) + ' 条建议');
        loadDrafts();
      });
    }

    loadActivities();
    loadItems();
  </script>
</body>
</html>
